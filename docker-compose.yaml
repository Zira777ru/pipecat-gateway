services:
  pipecat-gateway:
    build: .
    container_name: pipecat-gateway
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DAILY_API_KEY=${DAILY_API_KEY}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
